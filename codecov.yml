codecov:
  require_ci_to_pass: yes
  notify:
    wait_for_ci: yes

coverage:
  status:
    project:
      default:
        target: 80%
        threshold: 2%
        informational: false
    patch:
      default:
        target: 80%
        threshold: 5%
        informational: false

comment:
  layout: 'reach,diff,flags,tree,files'
  behavior: default
  require_changes: false
  require_base: no
  require_head: yes

flag_management:
  default_rules:
    carryforward: true

flags:
  ai-worker:
    paths:
      - services/ai-worker/
  api-gateway:
    paths:
      - services/api-gateway/
  bot-client:
    paths:
      - services/bot-client/
  common-types:
    paths:
      - packages/common-types/
  voice-engine:
    paths:
      - services/voice-engine/
  # Component tests (PGLite) cover all services + packages
  component:
    paths:
      - services/
      - packages/

ignore:
  - '**/*.test.ts'
  - '**/*.spec.ts'
  - '**/tests/**'
  - '**/dist/**'
  - '**/node_modules/**'
  - 'scripts/**'
  - 'tzurot-legacy/**'
  # Service entry points and BullMQ wiring: bootstrap glue (Express setup,
  # Worker/Queue instantiation, Discord client login, HTTP listeners). These
  # are composition roots — unit-testing them requires extensive mocking of
  # discord.js / bullmq / express internals that tests the mocks rather than
  # behavior. Real coverage comes from integration and smoke tests.
  #
  # Blanket policy across all service entry points, not per-PR: if we add a
  # fourth service, its index.ts belongs here too. To tighten coverage on
  # this class of file, the answer is to extract testable helpers into their
  # own modules (DI refactor), not to unit-test the composition root.
  - 'services/api-gateway/src/index.ts'
  - 'services/ai-worker/src/index.ts'
  - 'services/bot-client/src/index.ts'
  - 'services/api-gateway/src/queue.ts'
  # DB composition root: getPrismaClient() wires pg.Pool + the driver adapter +
  # PrismaClient. Same class as the entry points above — unit-testing it means
  # mocking pg/adapter/client (testing the mocks). The real logic (pool sizing,
  # the saturation gauge) lives in the fully-tested poolConfig.ts. Already
  # exempt from the colocated-test rule in structure.test.ts for this reason.
  - 'packages/common-types/src/services/prisma.ts'
  # Auto-generated client classes from the route manifest. Tested indirectly
  # via codegen unit tests (packages/tooling/src/codegen/) that assert the
  # generated string output. Each file carries the AUTO-GENERATED header
  # and is regenerated by the pre-commit hook on every manifest change.
  - '**/_generated/**'
  # Route manifest declarations — pure data tables, not logic. Validated
  # by per-audience invariant tests (audience: 'X', no duplicate IDs, no
  # duplicate method+path tuples, params match path placeholders, etc.).
  # Adding a new route is one entry, not a code change, so per-route line
  # coverage isn't meaningful.
  - 'packages/common-types/src/routes/**'
  # Manifest-conformance harness fixtures: test infrastructure that only
  # executes inside the conformance integration suite (same class as
  # __mocks__ / test-utils helpers, which the colocated-test and dead-file
  # checks also exempt). The integration coverage upload doesn't currently
  # collect services/** (its include globs are root-relative), so these
  # would otherwise read as permanently-0% production code in patch status.
  - 'services/api-gateway/src/routes/conformance/fixtures/**'
