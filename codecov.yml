codecov:
  require_ci_to_pass: yes
  notify:
    wait_for_ci: yes

coverage:
  status:
    project:
      default:
        target: 80%
        threshold: 2%
        informational: false
    patch:
      default:
        target: 80%
        threshold: 5%
        informational: false

comment:
  layout: 'reach,diff,flags,tree,files'
  behavior: default
  require_changes: false
  require_base: no
  require_head: yes

flag_management:
  default_rules:
    carryforward: true

flags:
  ai-worker:
    paths:
      - services/ai-worker/
  api-gateway:
    paths:
      - services/api-gateway/
  bot-client:
    paths:
      - services/bot-client/
  common-types:
    paths:
      - packages/common-types/
  voice-engine:
    paths:
      - services/voice-engine/
  # Integration tests cover all services
  integration:
    paths:
      - services/
      - packages/

ignore:
  - '**/*.test.ts'
  - '**/*.spec.ts'
  - '**/tests/**'
  - '**/dist/**'
  - '**/node_modules/**'
  - 'scripts/**'
  - 'tzurot-legacy/**'
  # Service entry points: bootstrap glue (Express setup, BullMQ worker wiring,
  # HTTP listeners). Unit-testing these requires extensive mocking of discord.js
  # / bullmq / express internals that tests the mocks rather than behavior —
  # real coverage comes from integration tests. Excluding them prevents pure
  # refactors (e.g. log-prefix normalization) from tripping patch coverage on
  # lines that were already uncovered before the change.
  - 'services/api-gateway/src/index.ts'
  - 'services/ai-worker/src/index.ts'
  - 'services/bot-client/src/index.ts'
  - 'services/api-gateway/src/queue.ts'
