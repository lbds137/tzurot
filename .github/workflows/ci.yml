name: CI

on:
  push:
    # Run on all branches - simplest approach for one-person project
    # No pull_request trigger = no duplicate runs
    branches: ['**']

# Cancel in-progress runs when new commits are pushed to same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

# Minimal permissions for security
permissions:
  contents: read

jobs:
  fixup-check:
    # Block merge until review-cycle `fixup!` commits are autosquashed into
    # their target commits. Fails if any commit on the branch (since the
    # merge base with develop) has a subject starting with "fixup!" or
    # "squash!". Run only on feature branches — main and develop are
    # post-merge so any fixups there are already permanent history.
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/main' && github.ref != 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so `git log origin/develop..HEAD` works regardless
          # of how many commits the branch has accumulated during review.
          fetch-depth: 0
      - name: Block unsquashed fixup commits
        run: |
          # Prefer develop as the merge base; fall back to main for branches
          # cut directly from main (rare).
          if git rev-parse --verify origin/develop >/dev/null 2>&1; then
            BASE=$(git merge-base HEAD origin/develop)
          else
            BASE=$(git merge-base HEAD origin/main)
          fi

          FIXUPS=$(git log "$BASE..HEAD" --format='%h %s' | grep -E '^[a-f0-9]+ (fixup|squash)!' || true)
          if [ -n "$FIXUPS" ]; then
            echo "::error::Branch contains unsquashed fixup/squash commits. Run \`git rebase --autosquash <base> && git push --force-with-lease\` before merging."
            echo ""
            echo "Offending commits:"
            echo "$FIXUPS"
            exit 1
          fi

          echo "No fixup/squash commits — branch is merge-ready."

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build packages
        run: pnpm --filter './packages/*' build

      - name: Run linter
        run: pnpm run lint

      - name: Run copy-paste detection
        run: pnpm cpd
        continue-on-error: true

      - name: Check for duplicate export names
        run: pnpm ops guard:duplicate-exports
        continue-on-error: true

      - name: Check dependency boundaries
        run: pnpm depcruise

      - name: Check for unused code (knip)
        run: pnpm knip
        continue-on-error: true

      - name: Run typecheck:spec
        run: pnpm typecheck:spec

      - name: Check pglite schema is in sync with Prisma
        # Dummy URL - prisma migrate diff doesn't connect, just needs provider hint
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
        run: |
          # Verify schema file exists
          if [ ! -f "packages/test-utils/schema/pglite-schema.sql" ]; then
            echo "❌ ERROR: packages/test-utils/schema/pglite-schema.sql not found"
            echo "Run: pnpm ops test:generate-schema"
            exit 1
          fi

          # Use the ops generator so CI matches what developers run locally.
          # The generator appends CHECK constraints harvested from migration SQL
          # (Prisma's schema-diff has no CHECK representation), so a raw
          # `prisma migrate diff` would produce a different file and always
          # flag drift.
          pnpm ops test:generate-schema --output /tmp/fresh-pglite-schema.sql > /dev/null

          # Compare with committed schema
          if ! diff -q packages/test-utils/schema/pglite-schema.sql /tmp/fresh-pglite-schema.sql > /dev/null 2>&1; then
            echo "❌ ERROR: pglite-schema.sql is out of sync with prisma/schema.prisma"
            echo ""
            echo "The integration test schema must match the Prisma schema."
            echo "Run: pnpm ops test:generate-schema"
            echo ""
            echo "Diff:"
            diff packages/test-utils/schema/pglite-schema.sql /tmp/fresh-pglite-schema.sql || true
            exit 1
          fi
          echo "✓ pglite-schema.sql is in sync with Prisma schema"

      - name: Check for unjustified lint suppressions
        run: |
          OUTPUT=$(NO_COLOR=1 pnpm ops xray --suppressions 2>&1)
          if echo "$OUTPUT" | grep -q "No justification"; then
            echo "❌ Unjustified lint suppressions found!"
            echo "$OUTPUT" | grep -A1 "No justification"
            echo ""
            echo "Every eslint-disable and ts-expect-error must have a -- justification comment."
            echo "See .claude/rules/02-code-standards.md for examples."
            exit 1
          fi
          # Report suppression count for trend tracking
          echo "$OUTPUT" | head -5

      - name: Audit contract test coverage
        run: pnpm ops test:audit --category=contracts

      - name: Audit service integration test coverage
        run: pnpm ops test:audit --category=services

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Clean build artifacts
        run: find . -name "*.tsbuildinfo" -delete && find ./packages/*/dist -type d -exec rm -rf {} + 2>/dev/null || true

      - name: Build packages
        run: pnpm --filter './packages/*' build

      - name: Run unit tests with coverage
        run: pnpm test:coverage

      - name: Debug - List coverage files
        run: find . -name "lcov.info" -o -name "coverage-final.json" | head -20

      - name: Upload ai-worker coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./services/ai-worker/coverage/lcov.info
          flags: ai-worker
          fail_ci_if_error: true
          verbose: true

      - name: Upload api-gateway coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./services/api-gateway/coverage/lcov.info
          flags: api-gateway
          fail_ci_if_error: true
          verbose: true

      - name: Upload bot-client coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./services/bot-client/coverage/lcov.info
          flags: bot-client
          fail_ci_if_error: true
          verbose: true

      - name: Upload common-types coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./packages/common-types/coverage/lcov.info
          flags: common-types
          fail_ci_if_error: true
          verbose: true

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./services/*/junit.xml,./packages/*/junit.xml
          report_type: test_results

      - name: Run type checking
        run: pnpm run typecheck

  integration-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: ankane/pgvector:latest
        env:
          POSTGRES_USER: postgres
          # Non-sensitive test password for ephemeral CI database
          POSTGRES_PASSWORD: test_ci_password
          POSTGRES_DB: tzurot_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build packages
        run: pnpm --filter './packages/*' build

      - name: Run database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:test_ci_password@localhost:5432/tzurot_test

      - name: Run integration tests with coverage
        run: pnpm test:int -- --coverage
        env:
          DATABASE_URL: postgresql://postgres:test_ci_password@localhost:5432/tzurot_test
          REDIS_URL: redis://localhost:6379
          CI: true

      - name: Upload integration coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/integration/lcov.info
          flags: integration
          fail_ci_if_error: true
          verbose: true

  voice-engine-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            voice-engine:
              - 'services/voice-engine/**'

      - name: Setup Python
        if: steps.filter.outputs.voice-engine == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install test dependencies
        if: steps.filter.outputs.voice-engine == 'true'
        run: pip install -r services/voice-engine/requirements-dev.txt

      - name: Run ruff linter
        if: steps.filter.outputs.voice-engine == 'true'
        run: cd services/voice-engine && ruff check .

      - name: Run mypy type checker
        if: steps.filter.outputs.voice-engine == 'true'
        run: cd services/voice-engine && mypy --strict server.py tests/

      - name: Run voice-engine tests
        if: steps.filter.outputs.voice-engine == 'true'
        run: cd services/voice-engine && python -m pytest tests/ -v --cov=server --cov-report=xml:coverage.xml

      - name: Upload voice-engine coverage to Codecov
        if: ${{ !cancelled() && steps.filter.outputs.voice-engine == 'true' }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./services/voice-engine/coverage.xml
          flags: voice-engine
          fail_ci_if_error: true
          verbose: true

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Clean build artifacts
        run: find . -name "*.tsbuildinfo" -delete && find ./packages/*/dist -type d -exec rm -rf {} + 2>/dev/null || true

      - name: Build all services
        run: pnpm run build
