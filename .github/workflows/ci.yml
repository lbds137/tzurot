name: CI

on:
  push:
    # Run on all branches - simplest approach for one-person project
    # No pull_request trigger = no duplicate runs
    branches: ['**']

# Cancel in-progress runs when new commits are pushed to same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

# Minimal permissions for security
permissions:
  contents: read

jobs:
  fixup-check:
    # Block merge until review-cycle `fixup!` commits are autosquashed into
    # their target commits. Fails if any commit on the branch (since the
    # merge base with develop) has a subject starting with "fixup!" or
    # "squash!". Run only on feature branches — main and develop are
    # post-merge so any fixups there are already permanent history.
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/main' && github.ref != 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so `git log origin/develop..HEAD` works regardless
          # of how many commits the branch has accumulated during review.
          fetch-depth: 0
      - name: Block unsquashed fixup commits
        run: |
          # Prefer develop as the merge base; fall back to main for branches
          # cut directly from main (rare).
          if git rev-parse --verify origin/develop >/dev/null 2>&1; then
            BASE=$(git merge-base HEAD origin/develop)
          else
            BASE=$(git merge-base HEAD origin/main)
          fi

          FIXUPS=$(git log "$BASE..HEAD" --format='%h %s' | grep -E '^[a-f0-9]+ (fixup|squash)!' || true)
          if [ -n "$FIXUPS" ]; then
            echo "::error::Branch contains unsquashed fixup/squash commits. Run \`git rebase --autosquash <base> && git push --force-with-lease\` before merging."
            echo ""
            echo "Offending commits:"
            echo "$FIXUPS"
            exit 1
          fi

          echo "No fixup/squash commits — branch is merge-ready."

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build packages
        run: pnpm --filter './packages/*' build

      - name: Run linter
        run: pnpm run lint

      - name: Run copy-paste detection
        run: pnpm cpd
        continue-on-error: true

      - name: Enforce CPD ratchet (filtered count must not exceed baseline)
        run: pnpm ops cpd:check

      - name: Enforce route-manifest / generated-client drift
        # Hard backstop for `--no-verify` bypasses of the pre-commit hook
        # that regenerates `packages/common-types/src/clients/_generated/`
        # whenever the manifest is edited. Fails if any committed
        # generated file differs from what the current manifest would
        # produce. To fix locally: `pnpm ops codegen:routes` then commit.
        run: pnpm ops codegen:routes --check

      - name: Enforce command-types codegen drift
        # Same backstop for the command-option schemas generated into
        # packages/common-types/src/generated/commandOptions.ts from the
        # bot-client command files. To fix locally:
        # `pnpm ops codegen:command-types` then commit.
        run: pnpm ops codegen:command-types --check

      - name: Enforce no bare @tzurot/common-types barrel import
        # The root barrel was removed (barrel-kill epic) — import from a deep
        # subpath. eslint's no-restricted-imports catches STATIC bare imports;
        # this grep is the backstop for the dynamic `import()` / type-query forms
        # it can't see. The excludes are the intentional fixture strings + the
        # doc/generated comments that embed the specifier as text, not imports.
        run: |
          if grep -rInE "from ['\"]@tzurot/common-types['\"]|import\(['\"]@tzurot/common-types['\"]\)" \
               --include='*.ts' --exclude-dir=node_modules --exclude-dir=dist services packages tests scripts \
             | grep -vE 'check-boundaries\.test\.ts|audit-unified\.test\.ts|importAssertions\.test\.ts|coverageTopology\.test\.ts|codegen/command-types\.ts|generated/commandOptions\.ts'; then
            echo "❌ Bare @tzurot/common-types barrel import found — use a deep subpath (e.g. @tzurot/common-types/types/jobs)."
            exit 1
          fi
          echo "✓ No bare @tzurot/common-types barrel imports."

      - name: Enforce coverage-topology drift
        # Byte-compares the committed coverage-topology.json against what the
        # current code (ROUTE_MANIFEST + JobType payload schemas + the context
        # envelope) would generate. Fails if a new or newly-uncovered
        # cross-service surface isn't reflected in the committed artifact.
        # To fix locally: `pnpm ops topology:generate --write` then commit.
        run: pnpm ops topology:check

      - name: Check for duplicate export names
        run: pnpm ops guard:duplicate-exports

      - name: Check for export* barrels (re-mask knip)
        run: pnpm ops guard:no-export-star

      - name: Check prompt structural tags are classified (injection guard)
        run: pnpm ops guard:prompt-tags

      - name: Check Dockerfile runner-stage dist copies
        run: pnpm ops guard:dockerfile-dist

      - name: Check for orphan proposal docs
        run: pnpm ops guard:proposal-links

      - name: Check audit tools have WHY.md
        run: pnpm ops guard:audit-tool-docs

      # Claude-workflow sync: a change to the self-validating claude workflow
      # files (claude-code-review.yml / claude.yml) reaching develop before
      # main silently disables claude-review on every PR (green ~15s no-op)
      # until the next release. Other workflow files (this one included) run
      # from the PR branch and may land via develop normally. The guard skips
      # itself on main-cut branches.
      - name: Enforce claude-workflow sync with main
        run: pnpm ops guard:workflow-sync

      - name: Check claude/ command references resolve
        run: pnpm ops guard:claude-content-refs

      - name: Check test-tier taxonomy is single-sourced
        run: pnpm ops guard:test-taxonomy

      - name: Check backlog layout caps and links
        run: pnpm backlog:lint

      - name: Enforce always-loaded context line budgets
        # Ratchet over .claude/rules/*.md + CURRENT.md — the always-loaded
        # surfaces bloat via doc commits that skip heavy checks, so this
        # also runs on the pre-push docs-only fast path and in pnpm quality.
        run: pnpm ops lines:check

      - name: Enforce UX literal-adoption ratchet
        # Raw user-facing literal count in bot-client commands must not grow —
        # new messages come from ux/catalog (platform-portable-ux-design §4.5).
        run: pnpm ops ux:literals

      - name: Check local/CI gate parity
        run: pnpm ops guard:gate-parity

      - name: Audit slash-command surface consistency
        run: pnpm ops commands:audit --summary

      - name: Check dependency boundaries
        run: pnpm depcruise

      - name: Check for unused code (knip)
        run: pnpm knip

      - name: Check for dead files (knip:dead)
        run: pnpm knip:dead

      - name: Run typecheck:spec
        run: pnpm typecheck:spec

      - name: Check pglite schema is in sync with Prisma
        # Dummy URL - prisma migrate diff doesn't connect, just needs provider hint
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
        run: |
          # Verify schema file exists
          if [ ! -f "packages/test-utils/schema/pglite-schema.sql" ]; then
            echo "❌ ERROR: packages/test-utils/schema/pglite-schema.sql not found"
            echo "Run: pnpm ops test:generate-schema"
            exit 1
          fi

          # Use the ops generator so CI matches what developers run locally.
          # The generator appends CHECK constraints harvested from migration SQL
          # (Prisma's schema-diff has no CHECK representation), so a raw
          # `prisma migrate diff` would produce a different file and always
          # flag drift.
          pnpm ops test:generate-schema --output /tmp/fresh-pglite-schema.sql > /dev/null

          # Compare with committed schema
          if ! diff -q packages/test-utils/schema/pglite-schema.sql /tmp/fresh-pglite-schema.sql > /dev/null 2>&1; then
            echo "❌ ERROR: pglite-schema.sql is out of sync with prisma/schema.prisma"
            echo ""
            echo "The integration test schema must match the Prisma schema."
            echo "Run: pnpm ops test:generate-schema"
            echo ""
            echo "Diff:"
            diff packages/test-utils/schema/pglite-schema.sql /tmp/fresh-pglite-schema.sql || true
            exit 1
          fi
          echo "✓ pglite-schema.sql is in sync with Prisma schema"

      - name: Check for unjustified lint suppressions
        run: pnpm ops xray --suppressions --check

      - name: Audit contract test coverage
        run: pnpm ops test:audit --category=contracts

      - name: Audit service integration test coverage
        run: pnpm ops test:audit --category=services

  unit-tests:
    name: unit-tests (${{ matrix.cell }})
    runs-on: ubuntu-latest
    strategy:
      # One red cell must not cancel the others — each cell's result is
      # independent signal, and the calibration data needs all five times.
      fail-fast: false
      matrix:
        include:
          - cell: bot-client
            filter: --filter=@tzurot/bot-client
            coverage: ./services/bot-client/coverage/lcov.info
            flags: bot-client
            junit: ./services/bot-client/junit.xml
          - cell: ai-worker
            filter: --filter=@tzurot/ai-worker
            coverage: ./services/ai-worker/coverage/lcov.info
            flags: ai-worker
            junit: ./services/ai-worker/junit.xml
          - cell: api-gateway
            filter: --filter=@tzurot/api-gateway
            coverage: ./services/api-gateway/coverage/lcov.info
            flags: api-gateway
            junit: ./services/api-gateway/junit.xml
          - cell: website
            filter: --filter=@tzurot/website
            coverage: ''
            flags: ''
            junit: ./services/website/junit.xml
          - cell: tooling
            filter: --filter=@tzurot/tooling
            coverage: ''
            flags: ''
            junit: ./packages/tooling/junit.xml
          - cell: packages
            # Every workspace package except tooling (its own cell above).
            filter: --filter='./packages/*' --filter='!@tzurot/tooling'
            coverage: ./packages/common-types/coverage/lcov.info
            flags: common-types
            junit: ./packages/*/junit.xml
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Clean build artifacts
        run: find . -name "*.tsbuildinfo" -delete && find ./packages/*/dist -type d -exec rm -rf {} + 2>/dev/null || true

      - name: Run unit tests with coverage (cell scope)
        # turbo's test:coverage dependsOn ^build, so each cell builds exactly
        # the dependency graph its scope needs — no explicit build step.
        run: pnpm turbo run test:coverage ${{ matrix.filter }}

      - name: Upload cell coverage to Codecov
        if: ${{ !cancelled() && matrix.coverage != '' }}
        uses: codecov/codecov-action@v7
        with:
          # PyPI install path: the default binary download verifies its GPG
          # signature against a key fetched from keybase.io, which has gone
          # unavailable before (keybase 404 body piped into gpg — see
          # codecov/codecov-action#1955). pip keeps its own integrity checks.
          use_pypi: true
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ matrix.coverage }}
          flags: ${{ matrix.flags }}
          fail_ci_if_error: true
          verbose: true

      - name: Upload cell test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7
        with:
          use_pypi: true
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ matrix.junit }}
          report_type: test_results

      - name: Run type checking (all packages)
        # Whole-repo typecheck rides this cell (unfiltered turbo run typecheck)
        # because the cell already builds most of the dependency graph — but it
        # IS extra weight beyond this cell's 9 packages; if 'packages' becomes
        # the outlier cell, this step is the first suspect.
        if: ${{ matrix.cell == 'packages' }}
        run: pnpm run typecheck

  # Mutation-score ratchet (audit-class — see mutation-check.WHY.md). Stryker
  # runs report-only on the tracked packages; the ops checker compares the
  # scores against .github/baselines/mutation-baseline.json and fails on a
  # drop below a package's floor (baseline − graceMargin).
  mutation-tests:
    runs-on: ubuntu-latest
    env:
      # The per-package stryker configs default to concurrency 2 (dev-machine
      # memory ceiling); CI runners have 4 vCPUs, so run wider here. The knob
      # is not part of the baseline fingerprint — it changes speed, not what
      # the score measures.
      STRYKER_CONCURRENCY: '4'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Clean build artifacts
        run: find . -name "*.tsbuildinfo" -delete && find ./packages/*/dist -type d -exec rm -rf {} + 2>/dev/null || true

      - name: Build packages
        run: pnpm --filter './packages/*' build

      - name: Run mutation testing (config-resolver)
        run: pnpm --filter @tzurot/config-resolver test:mutation

      - name: Run mutation testing (cache-invalidation)
        run: pnpm --filter @tzurot/cache-invalidation test:mutation

      - name: Run mutation testing (conversation-history)
        run: pnpm --filter @tzurot/conversation-history test:mutation

      - name: Run mutation testing (identity)
        run: pnpm --filter @tzurot/identity test:mutation

      - name: Run mutation testing (clients)
        run: pnpm --filter @tzurot/clients test:mutation

      - name: Enforce mutation-score baseline
        run: pnpm ops mutation:check --summary

  # Component tier (PGLite, in-process) + the real-dependency tiers (integration
  # + contract). Only Redis is a real external dependency here — every DB-backed
  # test uses in-process PGLite, so no Postgres service is provisioned.
  component-integration-tests:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build packages
        run: pnpm --filter './packages/*' build

      - name: Run component tests with coverage
        run: pnpm test:component -- --coverage
        env:
          # Dummy URL: DB-backed tests use in-process PGLite; this only satisfies
          # the config layer's non-empty DATABASE_URL check (no Postgres is provisioned).
          DATABASE_URL: postgresql://postgres:test_ci_password@localhost:5432/tzurot_test
          REDIS_URL: redis://localhost:6379
          CI: true

      # Real-dependency tiers: contract (*.contract.test.ts — the golden-fixture
      # envelope consumer + the BullMQ pair) + integration (*.integration.test.ts,
      # e.g. the vision-fallback loop over real Redis). The coverage topology's
      # mechanism-presence check assumes
      # these tiers execute + gate in CI; this step is that gate. `if: !cancelled()`
      # so a component-test failure doesn't hide the contract tier's own result.
      - name: Run integration + contract tiers
        if: ${{ !cancelled() }}
        run: pnpm test:integration
        env:
          DATABASE_URL: postgresql://postgres:test_ci_password@localhost:5432/tzurot_test
          REDIS_URL: redis://localhost:6379
          CI: true

      - name: Upload component coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7
        with:
          # PyPI install path: the default binary download verifies its GPG
          # signature against a key fetched from keybase.io, which has gone
          # unavailable before (keybase 404 body piped into gpg — see
          # codecov/codecov-action#1955). pip keeps its own integrity checks.
          use_pypi: true
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/component/lcov.info
          flags: component
          fail_ci_if_error: true
          verbose: true

  voice-engine-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history: paths-filter otherwise deepens a shallow clone on
          # the fly, and that fetch races GitHub's shallow-file bookkeeping
          # ("fatal: shallow file has changed since we read it" flakes).
          fetch-depth: 0

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            voice-engine:
              - 'services/voice-engine/**'

      - name: Setup Python
        if: steps.filter.outputs.voice-engine == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install test dependencies
        if: steps.filter.outputs.voice-engine == 'true'
        run: pip install -r services/voice-engine/requirements-dev.txt

      - name: Run ruff linter
        if: steps.filter.outputs.voice-engine == 'true'
        run: cd services/voice-engine && ruff check .

      - name: Run mypy type checker
        if: steps.filter.outputs.voice-engine == 'true'
        run: cd services/voice-engine && mypy --strict server.py tests/

      - name: Run voice-engine tests
        if: steps.filter.outputs.voice-engine == 'true'
        run: cd services/voice-engine && python -m pytest tests/ -v --cov=server --cov-report=xml:coverage.xml

      - name: Upload voice-engine coverage to Codecov
        if: ${{ !cancelled() && steps.filter.outputs.voice-engine == 'true' }}
        uses: codecov/codecov-action@v7
        with:
          # PyPI install path: the default binary download verifies its GPG
          # signature against a key fetched from keybase.io, which has gone
          # unavailable before (keybase 404 body piped into gpg — see
          # codecov/codecov-action#1955). pip keeps its own integrity checks.
          use_pypi: true
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./services/voice-engine/coverage.xml
          flags: voice-engine
          fail_ci_if_error: true
          verbose: true

  # Path-filtered full image builds. Dockerfiles are otherwise verified only
  # by the real Railway deploy the merge triggers — post-merge is too late: a
  # shell-form CMD typo or a turbo-prune/COPY drift ships broken and takes
  # the service down at deploy time. Each leg builds only when its Dockerfile
  # or its build-input config changes, so most PRs skip all four. No layer
  # caching for now — the trigger is rare enough that a cold build per firing
  # is cheaper than carrying cache plumbing.
  docker-build-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          # Node services build from the REPO ROOT context (their pruner
          # stage COPYs the whole monorepo for turbo prune).
          - service: ai-worker
            context: .
          - service: api-gateway
            context: .
          - service: bot-client
            context: .
          # voice-engine is self-contained; its context is its own directory.
          - service: voice-engine
            context: services/voice-engine
          # website builds from the repo root (its content collection reads
          # docs/legal in place), but has no turbo prune — plain COPYs only.
          - service: website
            context: .
          # Second website leg builds the PREVIEW brand so brand-conditional
          # build logic (e.g. the legal-doc substitution guard) is exercised
          # at PR time instead of first failing on the dev deploy.
          - service: website
            context: .
            args: --build-arg SITE_BRAND=rotzot
            tag_suffix: -rotzot
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history: paths-filter otherwise deepens a shallow clone on
          # the fly, and that fetch races GitHub's shallow-file bookkeeping
          # ("fatal: shallow file has changed since we read it" flakes).
          fetch-depth: 0

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            ai-worker:
              - 'services/ai-worker/Dockerfile'
              - '.dockerignore'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - 'pnpm-lock.yaml'
              - 'package.json'
            api-gateway:
              - 'services/api-gateway/Dockerfile'
              - '.dockerignore'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - 'pnpm-lock.yaml'
              - 'package.json'
            bot-client:
              - 'services/bot-client/Dockerfile'
              - '.dockerignore'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - 'pnpm-lock.yaml'
              - 'package.json'
            voice-engine:
              - 'services/voice-engine/Dockerfile'
              - 'services/voice-engine/requirements.txt'
            website:
              # Mirrors the Dockerfile's COPY list exactly (no turbo.json — the
              # website build has no turbo-prune stage).
              - 'services/website/**'
              - '.dockerignore'
              - 'docs/legal/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'package.json'

      - name: Build image
        if: steps.filter.outputs[matrix.service] == 'true'
        run: docker build ${{ matrix.context }} -f services/${{ matrix.service }}/Dockerfile ${{ matrix.args }} -t smoke/${{ matrix.service }}${{ matrix.tag_suffix }}:ci

      # The website legs go beyond build-success: serve the image and assert
      # the per-brand CONTENT (robots directives + the legal-page brand
      # substitution) — a build can succeed with either ternary branch flipped.
      - name: Verify served website content per brand
        if: matrix.service == 'website' && steps.filter.outputs[matrix.service] == 'true'
        run: |
          docker run -d --rm --name website-smoke -p 8080:8080 smoke/${{ matrix.service }}${{ matrix.tag_suffix }}:ci
          # --retry-all-errors, not just --retry-connrefused: during nginx's
          # startup window the port accepts the TCP connection then resets it,
          # which is a recv failure (curl exit 56), not connection-refused.
          curl -sf --retry 15 --retry-delay 1 --retry-all-errors http://localhost:8080/health \
            || { echo '--- container logs ---'; docker logs website-smoke; exit 1; }
          if [ "${{ matrix.tag_suffix }}" = "-rotzot" ]; then
            curl -s http://localhost:8080/robots.txt | grep -q "Disallow: /"
            curl -s http://localhost:8080/terms/ | grep -q "Rotzot Terms of Service"
          else
            curl -s http://localhost:8080/robots.txt | grep -q "Sitemap: https://tzurot.org"
            curl -s http://localhost:8080/terms/ | grep -q "Tzurot Terms of Service"
          fi
          docker stop website-smoke

  # Join job: one stable check name aggregating the matrix legs, so branch
  # protection can require "docker-build-smoke-ok" instead of four
  # matrix-suffixed contexts. A skipped leg still reports success (its build
  # step was gated, the job itself passed), so this only fails when a fired
  # build genuinely failed.
  docker-build-smoke-ok:
    runs-on: ubuntu-latest
    needs: docker-build-smoke
    if: always()
    steps:
      - name: All fired legs built successfully
        run: test "${{ needs.docker-build-smoke.result }}" = "success"

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Clean build artifacts
        run: find . -name "*.tsbuildinfo" -delete && find ./packages/*/dist -type d -exec rm -rf {} + 2>/dev/null || true

      - name: Build all services
        run: pnpm run build
