version: 2
updates:
  # Single npm entry at root. Dependabot's pnpm-workspace mode reads
  # dependencies from ALL workspace package.json files via the root
  # lockfile, so this one entry covers the root's devDependencies *and*
  # every service's production + development deps.
  #
  # Historical note: earlier versions of this config had additional
  # per-workspace entries (directory: /services/bot-client, etc.) which
  # produced redundant PRs every week — a shared dep like discord.js
  # would land in both the root production-dependencies PR and the
  # per-service PR with a partial lockfile update that failed CI. The
  # simplified form below produces two PRs per week (prod group + dev
  # group) that each cover the whole repo cleanly.
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'America/New_York'
    target-branch: 'develop'
    open-pull-requests-limit: 5
    reviewers:
      - 'lbds137'
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'
    labels:
      - 'dependencies'
      - 'automated'
    groups:
      production-dependencies:
        dependency-type: 'production'
        patterns:
          - '*'
      development-dependencies:
        dependency-type: 'development'
        patterns:
          - '*'
    ignore:
      # jscpd 5.x is a fresh Rust rewrite (5.0.4 shipped 2026-06-08, v4 still
      # maintained in parallel) that drops the `.jscpd.json` `ignore` key — only
      # the CLI `--ignore-pattern` works — and shifts detection counts vs the JS
      # engine. Pinned to 4.x until the CPD tooling is migrated. See the
      # "Migrate CPD tooling to jscpd 5" entry in backlog/cold/follow-ups.md.
      - dependency-name: 'jscpd'
        update-types: ['version-update:semver-major']
      # TypeScript 7.x is not yet supported by typescript-eslint —
      # @typescript-eslint/typescript-estree crashes at parse time under TS 7
      # ("Cannot read properties of undefined (reading 'Cjs')"), which turns
      # every dev-deps group PR carrying the major permanently red. Take the
      # TS 7 upgrade deliberately once typescript-eslint ships support, then
      # remove this ignore. See the follow-up in backlog/cold/follow-ups.md.
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']

  # GitHub Actions workflow file dependencies — separate ecosystem.
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'America/New_York'
    target-branch: 'develop'
    open-pull-requests-limit: 5
    reviewers:
      - 'lbds137'
    commit-message:
      prefix: 'chore(ci)'
      include: 'scope'
    labels:
      - 'dependencies'
      - 'automated'
